services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: jetstock_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
        networks:
            - jetstock_network
        depends_on:
            - db

    nginx:
        image: nginx:alpine
        container_name: jetstock_nginx
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - .:/var/www
            - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
        networks:
            - jetstock_network
        depends_on:
            - app

    db:
        image: postgres:16-alpine
        container_name: jetstock_db
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        ports:
            - "5432:5432"
        volumes:
            - jetstock_pgdata:/var/lib/postgresql/data
        networks:
            - jetstock_network

networks:
    jetstock_network:
        driver: bridge

volumes:
    jetstock_pgdata:
